    <script>
      // Safeguard for environments where window.fetch has only a getter (sandboxed iFrames, etc.)
      try {
        (function() {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            }
          });
        })();
      } catch (e) {
        console.warn("Could not define fetch property setter:", e);
      }
    </script>
